worker_processes auto;
events { worker_connections 1024; }

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile     on;
  keepalive_timeout 65;

  # server_tokens off — deliberadamente omitido para el lab

  # Cabecera informativa (vector de reconocimiento)
  add_header X-Powered-By "Corp-Logistics-v2.1";
  add_header X-Content-Type-Options nosniff;
  # Nota: sin X-Frame-Options ni CSP — otro vector a descubrir

  upstream flask_app { server app:5000; }

  server {
    listen 80;
    server_name _;

    add_header Server "nginx/Corp-Logistics";

    location / {
      proxy_pass            http://flask_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
    }

    location /health {
      proxy_pass http://flask_app/health;
      access_log off;
    }

    # Directorio .git expuesto — vector de reconocimiento adicional
    location /.git {
      return 200 'Corp-Logistics internal repo — v2.1.4';
      add_header Content-Type text/plain;
    }
  }
}
